services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
      - ./entrypoint.sh:/entrypoint.sh
    restart: unless-stopped
    pull_policy: always
    entrypoint: ["/usr/bin/bash", "/entrypoint.sh"]

  rag-app:
    build: .
    container_name: rag-app
    ports:
      - "8501:8501"
    depends_on:
      - ollama
    environment:
      - OLLAMA_URL=http://ollama:11434
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  ollama-data:
